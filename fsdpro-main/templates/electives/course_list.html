{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Available Courses</h2>

<div class="row">
    {% for course in courses %}
    <div class="col-md-4 mb-4">
        <div class="card p-3">
            <h5>{{ course.name }}</h5>
            <p class="text-muted">{{ course.description }}</p>

            <a href="{% url 'course_detail' course_id=course.id %}" class="btn btn-primary btn-sm">
                View Details
            </a>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
