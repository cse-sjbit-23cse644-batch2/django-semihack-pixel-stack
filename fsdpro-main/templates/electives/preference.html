{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Select Preferences</h2>

<form method="post" class="card p-4">
    {% csrf_token %}

    {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
        </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Submit</button>
</form>

{% endblock %}
