{% extends 'base.html' %}

{% block content %}

<div class="card p-4 text-center">
    <h2 class="mb-3">Test Result</h2>

    <h4>Course: {{ course.name }}</h4>

    <p class="mt-3">Score: <strong>{{ score }}</strong></p>
    <p>Final Score: <strong>{{ final_score }}</strong></p>

    {% if eligible %}
        <div class="alert alert-success mt-3">
            ✅ You are eligible!
        </div>
    {% else %}
        <div class="alert alert-danger mt-3">
            ❌ Not eligible
        </div>
    {% endif %}

    <a href="/" class="btn btn-primary mt-3">Back to Courses</a>
</div>

{% endblock %}
