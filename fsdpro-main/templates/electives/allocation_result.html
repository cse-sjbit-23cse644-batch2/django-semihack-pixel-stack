{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Allocation Results</h2>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Student</th>
            <th>Course</th>
        </tr>
    </thead>
    <tbody>
        {% for result in results %}
        <tr>
            <td>{{ result.student }}</td>
            <td>{{ result.course }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
