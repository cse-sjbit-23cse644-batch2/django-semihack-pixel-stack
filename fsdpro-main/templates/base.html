<!DOCTYPE html>
<html>
<head>
    <title>College Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* HEADER */
        .header {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            padding: 25px 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            margin-top: 5px;
            font-size: 14px;
        }

        /* MAIN PAGE CONTAINER */
        .page-container {
            max-width: 1100px;     /* controls width */
            margin: 30px auto;     /* center alignment */
            padding: 0 20px;       /* left-right spacing */
        }

        /* CARD DESIGN */
        .card {
            background: white;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        /* BUTTON STYLE */
        button, .btn {
            background: #1e3c72;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        button:hover, .btn:hover {
            background: #16325c;
        }

        /* INPUTS */
        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* FOOTER */
        .footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 12px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>S J B Institute Of Technology</h1>
    <p>Open Elective Selection Portal</p>
</div>

<div class="page-container">
    {% block content %}
    {% endblock %}
</div>

<div class="footer">
    © 2026 College Portal
</div>

</body>
</html>
