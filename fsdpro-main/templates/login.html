<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

.login-box{
    width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
    color:white;
}

.logo{
    font-size:42px;
    text-align:center;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.form-control{
    height:48px;
    border-radius:12px;
    border:none;
}

.btn-login{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
    font-size:16px;
    transition:0.3s;
}

.btn-login:hover{
    background:#2563eb;
}

.demo-box{
    margin-top:25px;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
    font-size:14px;
}

.error{
    color:#fca5a5;
    margin-top:12px;
    text-align:center;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">🎓</div>

<div class="title">Student Portal</div>

<div class="subtitle">
Login to access electives & quiz
</div>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" class="form-control mb-3" placeholder="Enter Username">

<input type="password" name="password" class="form-control mb-3" placeholder="Enter Password">

<button type="submit" class="btn-login">
Login
</button>
</form>

<p class="error">{{ message }}</p>

<div class="demo-box">
<b>Demo Login:</b><br>
Username: <b>student1</b><br>
Password: <b>student123</b>
</div>

</div>

</body>
</html>
